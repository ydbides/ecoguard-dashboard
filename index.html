<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoGuard PRO V2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1117;
  color:#f0f6fc;
}

.topbar{
  padding:15px;
  background:#161b22;
  border-bottom:1px solid #30363d;
  font-size:20px;
  font-weight:bold;
}

.content{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#161b22;
  padding:15px;
  border-radius:10px;
  border:1px solid #30363d;
}

.value{
  font-size:24px;
  margin-top:10px;
}

.pill{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  display:inline-block;
  font-weight:bold;
  color:white;
  background:#30363d;
}

.alert{
  display:none;
  background:#da3633;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

canvas{
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<div class="topbar">EcoGuard PRO V2 Dashboard</div>

<div class="content">

<div id="alertBox" class="alert">⚠️ CRITICAL CONDITION DETECTED</div>

<div class="card">
  <b>Connection:</b> <span id="connection">Checking...</span> |
  <b>Last Update:</b> <span id="lastUpdate">--</span>
</div>

<br>

<div class="grid">
<div class="card"><div>Temperature</div><div class="value" id="temp">--</div><div class="pill" id="tempS"></div></div>
<div class="card"><div>Water</div><div class="value" id="water">--</div><div class="pill" id="waterS"></div></div>
<div class="card"><div>Turbidity</div><div class="value" id="turb">--</div><div class="pill" id="turbS"></div></div>
<div class="card"><div>pH</div><div class="value" id="ph">--</div><div class="pill" id="phS"></div></div>
<div class="card"><div>Voltage</div><div class="value">--</div></div>
<div class="card"><div>System</div><div class="value" id="status">--</div><div class="pill" id="sysS"></div></div>
</div>

<br>

<div class="grid">
<div class="card"><canvas id="tempChart"></canvas></div>
<div class="card"><canvas id="turbChart"></canvas></div>
<div class="card"><canvas id="waterChart"></canvas></div>
<div class="card"><canvas id="phChart"></canvas></div>
</div>

<br>

<div class="card">
  <h3>AI Analysis</h3>
  <div id="aiText">Analyzing...</div>
  <br>
  <b>Health Score:</b> <span id="health">--%</span><br>
  <b>Risk:</b> <span id="risk">--</span>
</div>

</div>

<script>
const URL = "https://ecoguard-11a04-default-rtdb.firebaseio.com/ecoguard/live.json";

let tempH=[], turbH=[], waterH=[], phH=[];
let lastTime=null;

// ===== COLOR =====
function color(el,status){
 if(status=="GOOD") el.style.background="#238636";
 else if(status=="MILD") el.style.background="#d29922";
 else if(status=="BAD") el.style.background="#f0883e";
 else el.style.background="#da3633";
}

// ===== GRAPH =====
function draw(id,data){
 let c=document.getElementById(id);
 let ctx=c.getContext("2d");
 ctx.clearRect(0,0,c.width,c.height);

 if(data.length<2)return;

 let max=Math.max(...data);
 let min=Math.min(...data);

 ctx.beginPath();
 data.forEach((v,i)=>{
   let x=(i/(data.length-1))*c.width;
   let y=c.height-((v-min)/(max-min||1))*c.height;
   i?ctx.lineTo(x,y):ctx.moveTo(x,y);
 });
 ctx.strokeStyle="cyan";
 ctx.stroke();
}

// ===== MAIN =====
async function load(){
 try{
  let r=await fetch(URL);
  let d=await r.json();

  document.getElementById("connection").innerText="Online";

  lastTime=new Date();

  let t=+d.temperature||0;
  let tb=+d.turbidity||0;
  let w=d.waterDetected?1:0;
  let p=+d.ph||0;

  temp.innerText=t.toFixed(1)+" °C";
  turb.innerText=tb;
  water.innerText=w?"OK":"LOW";
  ph.innerText=p.toFixed(2);
  status.innerText=d.status||"OK";

  let ts=t<24?"LOW":t>30?"HIGH":"GOOD";
  let ws=w?"GOOD":"CRITICAL";
  let tbs=tb<1800?"GOOD":tb<2200?"MILD":tb<3000?"BAD":"CRITICAL";
  let ps=p<6?"ACIDIC":p>8?"ALKALINE":"GOOD";
  let sys=(!w||tb>3000)?"CRITICAL":"STABLE";

  tempS.innerText=ts;
  waterS.innerText=ws;
  turbS.innerText=tbs;
  phS.innerText=ps;
  sysS.innerText=sys;

  color(tempS,ts);
  color(waterS,ws);
  color(turbS,tbs);
  color(phS,ps);
  color(sysS,sys);

  // ALERT
  document.getElementById("alertBox").style.display=
    sys=="CRITICAL"?"block":"none";

  // HISTORY
  tempH.push(t); turbH.push(tb); waterH.push(w); phH.push(p);
  if(tempH.length>30){tempH.shift();turbH.shift();waterH.shift();phH.shift();}

  draw("tempChart",tempH);
  draw("turbChart",turbH);
  draw("waterChart",waterH);
  draw("phChart",phH);

  // AI
  let health=100;
  if(ts!="GOOD") health-=20;
  if(ws!="GOOD") health-=40;
  if(tbs!="GOOD") health-=30;
  if(ps!="GOOD") health-=10;

  health=Math.max(0,health);

  let risk=health>80?"LOW":health>50?"MEDIUM":"HIGH";

  document.getElementById("health").innerText=health+"%";
  document.getElementById("risk").innerText=risk;

  let ai="System stable.";
  if(sys=="CRITICAL") ai="Immediate attention required!";
  else if(tbs!="GOOD") ai="Water quality declining.";
  else if(ts!="GOOD") ai="Temperature issue detected.";

  document.getElementById("aiText").innerText=ai;

 }catch{
  document.getElementById("connection").innerText="Offline";
 }
}

// TIMER
setInterval(()=>{
 if(!lastTime)return;
 let s=Math.floor((new Date()-lastTime)/1000);
 lastUpdate.innerText=s+" sec ago";
},1000);

// LOOP
setInterval(load,3000);
load();
</script>

</body>
</html>
